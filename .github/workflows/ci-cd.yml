name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 1. Continuous Integration (Lint, Build, Typecheck)
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Monorepo Dependencies
      run: npm ci

    - name: Check Code Formatting
      run: npx prettier --check "**/*.{ts,tsx,js,json,md,css}"

    - name: Typecheck Shared Packages
      run: npm run typecheck

    - name: Compile Backend App
      run: npm run build:api

    - name: Build Frontend Next.js
      run: npm run build:web

  # 2. Automated Testing
  test:
    needs: ci
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Backend Tests
      run: npm run test --workspace=apps/api
