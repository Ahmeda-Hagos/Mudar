name: CI/CD Pipeline Automation

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  AWS_REGION: "eu-central-1"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Workspace Dependencies
      run: npm install

    - name: Run Code Formatting Linter Check
      run: npm run lint --if-present || true

    - name: Run Prisma Code Generation
      run: npm run prisma:generate --workspace=visaflow-backend
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

    - name: Execute Workspace Test Suites
      run: npm run test --if-present
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

    - name: Compile Backend API Application Bundle
      run: npm run build:api
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

    - name: Compile Frontend Web Client Bundle
      run: npm run build:web
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Ensure Terraform State Bucket Exists
      run: |
        aws s3 mb s3://visaflow-tf-burner-state-49172 --region eu-central-1 || true

    - name: Terraform Init (Staging)
      run: terraform init
      working-directory: ./terraform/environments/staging

    - name: Terraform Apply (Staging)
      run: terraform apply -auto-approve
      working-directory: ./terraform/environments/staging
      env:
        TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
        TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}
        TF_VAR_kms_key_arn: ${{ secrets.TF_VAR_kms_key_arn }}

    - name: Login to Amazon ECR
      id: login-ecr-staging
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR (Staging)
      env:
        ECR_REGISTRY: ${{ steps.login-ecr-staging.outputs.registry }}
        ECR_REPOSITORY: visaflow-api-staging-v2
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f apps/api/Dockerfile .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push -a $ECR_REGISTRY/$ECR_REPOSITORY

    - name: Force ECS Service Update (Staging)
      run: |
        aws ecs update-service --cluster visaflow-cluster-staging-v2 --service visaflow-api-service-staging-v2 --force-new-deployment

    # Note: ECS Fargate Migration Task triggering would go here.

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: 
      name: production
      # This enables the required-reviewer gate (configured in GitHub UI)
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init (Production)
      run: terraform init
      working-directory: ./terraform/environments/production

    - name: Terraform Apply (Production)
      run: terraform apply -auto-approve
      working-directory: ./terraform/environments/production
      env:
        TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
        TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}
        TF_VAR_kms_key_arn: ${{ secrets.TF_VAR_kms_key_arn }}

    - name: Login to Amazon ECR
      id: login-ecr-prod
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR (Production)
      env:
        ECR_REGISTRY: ${{ steps.login-ecr-prod.outputs.registry }}
        ECR_REPOSITORY: visaflow-api-production-v2
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f apps/api/Dockerfile .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push -a $ECR_REGISTRY/$ECR_REPOSITORY

    - name: Force ECS Service Update (Production)
      run: |
        aws ecs update-service --cluster visaflow-cluster-production-v2 --service visaflow-api-service-production-v2 --force-new-deployment

    # Note: ECS Fargate Migration Task triggering would go here.
